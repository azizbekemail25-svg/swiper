<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coursel loyiha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>

    <div class="container">
        <h2>odiy js carusel</h2>
        <div class="carousel-container">
            <div class="carousel-slide active">
                <img src="https://picsum.photos/800/400?random=1" alt="Slayd 1">
                <div class="slide-text">Slayd 1</div>
            </div>
            <div class="carousel-slide">
                <img src="https://picsum.photos/800/400?random=2" alt="Slayd 2">
                <div class="slide-text">Slayd 2</div>
            </div>
            <div class="carousel-slide">
                <img src="https://picsum.photos/800/400?random=3" alt="Slayd 3">
                <div class="slide-text">Slayd 3</div>
            </div>
            <div class="carousel-slide">
                <img src="https://picsum.photos/800/400?random=4" alt="Slayd 4">
                <div class="slide-text">Slayd 4</div>
            </div>

            <button id="prevBtn" class="nav-btn">❮ Prev</button>
            <button id="nextBtn" class="nav-btn">Next ❯</button>
        </div>

        <h2>sviper js carusel optional</h2>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="https://picsum.photos/800/400?random=5" alt="Swiper 1">
                </div>
                <div class="swiper-slide">
                    <img src="https://picsum.photos/800/400?random=6" alt="Swiper 2">
                </div>
                <div class="swiper-slide">
                    <img src="https://picsum.photos/800/400?random=7" alt="Swiper 3">
                </div>
                <div class="swiper-slide">
                    <img src="https://picsum.photos/800/400?random=8" alt="Swiper 4">
                </div>
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
